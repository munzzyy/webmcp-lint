name: "webmcp-lint"
description: >-
  Lint a WebMCP tool manifest for prompt injection, missing safety hints, and
  unconstrained risky parameters, and upload the findings as SARIF so they
  land in the repo's Security tab.
author: "Cole Munz"

branding:
  icon: "shield"
  color: "blue"

inputs:
  python-version:
    description: "Python version used to install and run webmcp-lint."
    required: false
    default: "3.12"
  path:
    description: >-
      Manifest file, directory (checked for mcp.json / webmcp.json /
      .well-known/mcp.json inside it), or glob pattern to scan.
    required: false
    default: "."
  fail-on:
    description: "Minimum severity that fails the job (critical|high|medium|low|info|none)."
    required: false
    default: "high"
  ref:
    description: >-
      Git tag of munzzyy/webmcp-lint to install (it installs from source
      until it's on PyPI).
    required: false
    default: "v0.1.0"

outputs:
  result:
    description: "'pass' or 'fail', whether a finding at or above fail-on was found."
    value: ${{ steps.gate.outputs.result }}
  sarif-file:
    description: "Path to the generated SARIF file."
    value: ${{ steps.sarif.outputs.file }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install webmcp-lint
      shell: bash
      run: python3 -m pip install --quiet "git+https://github.com/munzzyy/webmcp-lint@${INPUTS_REF}"
      env:
        INPUTS_REF: ${{ inputs.ref }}

    # Generated separately from the fail-on gate below and with --fail-on
    # none, because render_sarif() always emits every finding regardless of
    # severity threshold -- the SARIF file shouldn't be missing results just
    # because they're below the job's own pass/fail bar.
    - name: Generate SARIF
      id: sarif
      shell: bash
      continue-on-error: true
      run: |
        set +e
        out="$RUNNER_TEMP/webmcp-lint.sarif"
        webmcp-lint "${INPUTS_PATH}" --sarif --fail-on none > "$out" 2>"$RUNNER_TEMP/webmcp-lint-sarif.err"
        code=$?
        set -e
        echo "file=$out" >> "$GITHUB_OUTPUT"
        if [ "$code" -ne 0 ]; then
          cat "$RUNNER_TEMP/webmcp-lint-sarif.err" >&2
        fi
        exit "$code"
      env:
        INPUTS_PATH: ${{ inputs.path }}

    - name: Upload SARIF
      if: steps.sarif.outcome == 'success'
      uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
      with:
        sarif_file: ${{ steps.sarif.outputs.file }}

    - name: Lint (fail-on gate)
      id: lint
      shell: bash
      continue-on-error: true
      run: |
        set +e
        out="$RUNNER_TEMP/webmcp-lint.human"
        webmcp-lint "${INPUTS_PATH}" --fail-on "${INPUTS_FAIL_ON}" --no-color > "$out" 2>&1
        code=$?
        set -e
        {
          echo "## webmcp-lint"
          echo ""
          echo '```'
          cat "$out"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
        exit "$code"
      env:
        INPUTS_PATH: ${{ inputs.path }}
        INPUTS_FAIL_ON: ${{ inputs.fail-on }}

    - name: Evaluate gate
      id: gate
      if: always()
      shell: bash
      run: |
        code="${{ steps.lint.outcome }}"
        if [ "$code" = "success" ]; then
          echo "result=pass" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "result=fail" >> "$GITHUB_OUTPUT"
        exit 1
